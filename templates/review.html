{% extends "base.html" %}

{% block content %}

<style>
.card {
    max-width: 800px;
}
.title {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}
</style>

{% if item %}

<div class="card">

<h2 class="title">{{ item[1] }}</h2>

<form method="post" action="/submit_review/{{ item[0] }}">
    <input type="hidden" name="user" value="{{ user }}">

    <div class="buttons">
        <button name="verdict" value="not spam">Not Spam</button>
        <button name="verdict" value="not sure">Not sure</button>
        <button name="verdict" value="spam">Definitely spam</button>
    </div>
</form>

<p>{{ item[2] }}</p>

<a href="{{ item[3] }}" target="_blank">View Bug</a>

</div>

{% else %}
<p>No items left.</p>
{% endif %}

{% endblock %}
