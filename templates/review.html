{% extends "base.html" %}

{% block content %}

<h1>Review</h1>

{% if item %}

<h2>
    <a href="{{ item[2] }}" target="_blank">
        {{ item[1] }}
    </a>
</h2>

<p><strong>Message:</strong></p>
<p>{{ item[3] }}</p>

<p><strong>Spam score:</strong> {{ item[4] }}</p>

<form method="post" action="/submit_review/{{ item[0] }}">
    <input type="hidden" name="reviewer" value="{{ reviewer }}">

    <button name="verdict" value="spam">Spam</button>
    <button name="verdict" value="ham">Not spam</button>
    <button name="verdict" value="unknown">Unknown</button>
</form>

{% else %}
<p>No items available.</p>
{% endif %}

{% endblock %}
