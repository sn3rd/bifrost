{% extends "base.html" %}

{% block content %}

<div class="card center">

    <h2>Login</h2>

    <p class="danger">
        ⚠ WARNING: This system uses UUIDs as authentication tokens. Do NOT use real secrets.
    </p>

    <form method="post" action="/login_submit">
        <input type="password" name="uuid" placeholder="Enter UUID" required>
        <button class="ham" type="submit">Login</button>
    </form>

</div>

{% endblock %}
