{% extends "base.html" %}

{% block content %}

<h1>Moderator</h1>

{% if item %}

<p>{{ item[1] }}</p>
<p>Spam score: {{ item[2] }}</p>
<p>User votes: {{ item[3] }}</p>

<form method="post" action="/submit_moderator/{{ item[0] }}">
    <button name="verdict" value="spam">Spam</button>
    <button name="verdict" value="ham">Not spam</button>
    <button name="verdict" value="unknown">Unknown</button>
</form>

{% else %}
<p>No items.</p>
{% endif %}

{% endblock %}
