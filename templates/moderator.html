{% extends "base.html" %}

{% block content %}

<h2>Moderator View</h2>

{% if item %}

<h3 class="title">{{ item[1] }}</h3>

<div>
    <button>Spam ({{ item[4] }})</button>
    <button>Not sure ({{ item[5] }})</button>
    <button>Not spam ({{ item[6] }})</button>
</div>

<p>{{ item[2] }}</p>

<form method="post" action="/submit_moderator/{{ item[0] }}">
    <button name="verdict" value="spam">Spam</button>
    <button name="verdict" value="not sure">Not sure</button>
    <button name="verdict" value="not spam">Not Spam</button>
</form>

<a href="{{ item[3] }}" target="_blank">View Bug</a>

{% else %}
<p>No items to moderate.</p>
{% endif %}

{% endblock %}
