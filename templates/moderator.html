{% extends "base.html" %}

{% block content %}

{% if item %}

<div class="card">

    <div class="title">{{ item[1] }}</div>

    <div class="meta">
        Bug ID: {{ item[0] }} ·
        <a href="{{ item[3] }}" target="_blank">Open bug</a>
    </div>

    <!-- MODERATOR VOTE STATS -->
    <table>
        <tr>
            <th>Spam</th>
            <th>Not sure</th>
            <th>Not spam</th>
        </tr>
        <tr>
            <td>{{ item[4] }}</td>
            <td>{{ item[5] }}</td>
            <td>{{ item[6] }}</td>
        </tr>
    </table>

    <!-- BUTTONS TOP -->
    <form method="post" action="/submit_moderator/{{ item[0] }}">
        <div class="actions">
            <button class="ham" name="verdict" value="not spam">Not Spam</button>
            <button class="unsure" name="verdict" value="not sure">Not sure</button>
            <button class="spam" name="verdict" value="spam">Definitely spam</button>
        </div>
    </form>

    <div class="body">
        {{ item[2] }}
    </div>

</div>

{% else %}
<p>No items left for moderation.</p>
{% endif %}

{% endblock %}
