<!DOCTYPE html>
<html>
<head>
    <title>Launchpad Moderation</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 20px;
        }

        /* ===== LOGO (CENTERED) ===== */
        .logo {
            display: flex;
            justify-content: center;
            margin: 10px 0 15px 0;
        }

        .logo img {
            height: 70px;   /* MODERATE SIZE */
            object-fit: contain;
        }

        /* ===== NAV ===== */
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav a {
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 16px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .body {
            margin-top: 12px;
            font-size: 14px;
            color: #222;
            line-height: 1.5;
            white-space: pre-wrap; /* IMPORTANT: no truncation */
        }

        /* ===== ACTION BUTTONS ===== */
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .spam { background: #ff3b30; color: white; }
        .unsure { background: #ffcc00; color: black; }
        .ham { background: #34c759; color: white; }

        table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>
<div class="container">

    <!-- CENTERED LOGO -->
    <div class="logo">
        <img src="/static/img/bifrost.png" alt="Bifrost">
    </div>

    <!-- NAVIGATION -->
    <div class="nav">
        <a href="/review">Review</a>
        <a href="/moderator">Moderator</a>
        <a href="/leaderboard">Leaderboard</a>
    </div>

    {% block content %}{% endblock %}
</div>
</body>
</html>
