<!DOCTYPE html>
<html>
<head>
    <title>Launchpad Moderation</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 20px;
        }

        /* ---------------- LOGO ---------------- */

        .logo {
            display: flex;
            justify-content: center;
            margin: 10px 0 15px 0;
        }

        .logo img {
            height: 70px;
        }

        /* ---------------- NAV ---------------- */

        .nav {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        /* ---------------- USER BAR ---------------- */

        .userbar {
            text-align: center;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }

        /* ---------------- PROGRESS ---------------- */

        .progress-wrap {
            margin: 10px 0 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e5ea;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #34c759, #30d158);
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 5px;
        }

        /* ---------------- CARD ---------------- */

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 16px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        .meta {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .body {
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* ---------------- ACTION BUTTONS ---------------- */

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .spam { background: #ff3b30; color: white; }
        .unsure { background: #ffcc00; color: black; }
        .ham { background: #34c759; color: white; }

        /* ---------------- FORM INPUTS ---------------- */

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        /* ---------------- UTILS ---------------- */

        .center { text-align: center; }
        .danger { color: red; }

        /* ---------------- LEADERBOARD ---------------- */

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 10px;
        }

        .leaderboard-table thead th {
            text-align: left;
            font-size: 12px;
            color: #888;
            padding: 10px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .leaderboard-table tbody tr {
            background: white;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border-radius: 12px;
        }

        .leaderboard-table tbody td {
            padding: 14px 12px;
            font-size: 14px;
        }

        .user-cell {
            font-weight: bold;
        }

        .num {
            text-align: center;
            width: 120px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="/static/img/bifrost.png" alt="logo">
    </div>

    <!-- NAV -->
    <div class="nav">
        <a href="/review">Review</a>
        <a href="/moderator">Moderator</a>
        <a href="/leaderboard">Leaderboard</a>

        {% if user %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/auth">Login</a>
        {% endif %}
    </div>

    <!-- USER -->
    {% if user %}
    <div class="userbar">
        Hello <b>{{ user[0] }}</b> ({{ user[2] }})
    </div>
    {% endif %}

    <!-- PROGRESS (optional, injected by pages) -->
    {% if progress_total is defined and progress_total > 0 %}
    <div class="progress-wrap">
        <div class="progress-bar">
            <div class="progress-fill"
                 style="width: {{ (progress_done / progress_total * 100) }}%;">
            </div>
        </div>
        <div class="progress-text">
            {{ progress_done }} / {{ progress_total }} completed
        </div>
    </div>
    {% endif %}

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

</div>

</body>
</html>
